# This is a docker compose file to start a developer environment
# Project name is set via COMPOSE_PROJECT_NAME in .env (generated by create-factory.sh)
services:
  dev:
    build:
      context: .
      dockerfile: dockerfile.dev
    container_name: ${COMPOSE_PROJECT_NAME}-dev
    working_dir: /workspace

    volumes:
      - ./src:/workspace
      - ./private-agent-instructions:/private-agent-instructions:ro
      - claude-home:/home/node # claude persists info here; Compose auto-prefixes with project name
    extra_hosts:
      - "host.docker.internal:host-gateway"

    environment:
      - PYTHONUNBUFFERED=1
      - DISPLAY

    ports:
      - "5000:5000"

    stdin_open: true
    tty: true
    init: true

    dns:
      - 8.8.8.8
      - 8.8.4.4

    security_opt:
      - apparmor:unconfined

    # Important for Chromium / Playwright stability
    shm_size: "2gb"

    # Optional: uncomment if you want a hard RAM cap
    # mem_limit: "8g"

    command: bash -lc "sleep infinity"

volumes:
  claude-home: